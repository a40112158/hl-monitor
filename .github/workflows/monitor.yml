name: Hyperliquid Wallet Monitor FINAL

on:
  workflow_dispatch:

  schedule:
    # 每小时第17分钟运行一次，UTC时间。
    # UTC 00:17 对应北京时间 08:17 / 日本时间 09:17。
    - cron: "17 * * * *"

permissions:
  contents: write

concurrency:
  group: hl-wallet-monitor-final
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Pull latest state
        run: |
          git pull --rebase || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Test Telegram on manual run
        if: github.event_name == 'workflow_dispatch'
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then
            echo "TG_BOT_TOKEN or TG_CHAT_ID is empty. Skip TG test."
          else
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TG_CHAT_ID}" \
              -d text="GitHub Actions TG test: Hyperliquid monitor is starting."
          fi

      - name: Run Hyperliquid monitor
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}

          # 0 = 只有强信号或每日复盘才推送；1 = 每次运行都推送
          PUSH_EVERY_RUN: "0"

          # UTC 00:00 = 北京时间 08:00 / 日本时间 09:00
          DAILY_PUSH_HOUR_UTC: "0"

          HL_RPM: "200"
          HL_CONCURRENCY: "5"
          MIN_OK_RATE: "0.85"
          MIN_WALLET_COUNT: "100"
          TOP_N: "15"

          # 低杠杆长期单过滤
          LONG_TERM_MODE: "1"
          LONG_TERM_MIN_SCORE: "7"
          LONG_TERM_MIN_STREAK: "2"
          LONG_TERM_RISK_PCT: "2"
          LONG_TERM_MAX_LEVERAGE: "3"

          # 每日归档：reports/daily/YYYY-MM-DD，每天保留一份长期复盘快照
          DAILY_ARCHIVE: "1"
          DAILY_ARCHIVE_KEEP_DAYS: "30"

          # 钱包质量系统：最近30天滚动分类并导出全部钱包
          WALLET_QUALITY_MODE: "1"
          WALLET_QUALITY_WINDOW_DAYS: "30"
          WALLET_QUALITY_MIN_SAMPLES: "10"
          WALLET_QUALITY_EXPORT: "1"

          # 合约杠杆质量过滤：适配低杠杆长期单
          LEVERAGE_QUALITY_MODE: "1"
          LEVERAGE_LOW_MAX: "3"
          LEVERAGE_MID_MAX: "5"
          LEVERAGE_HIGH_MIN: "10"
          LIQ_SAFE_DISTANCE_PCT: "40"
          LIQ_DANGER_DISTANCE_PCT: "10"

          PYTHONUNBUFFERED: "1"

        run: |
          python -u hl_monitor_final.py --rpm 200 --concurrency 5 --note "github hourly"

      - name: Clean report archives
        run: |
          mkdir -p reports
          # 新版不再保留小时级 final_report_run_x.txt，历史遗留文件也删除
          rm -f reports/final_report_run_*.txt
          # 每日归档只保留最近 30 天
          if [ -d reports/daily ]; then
            find reports/daily -mindepth 1 -maxdepth 1 -type d | sort | head -n -30 | xargs -r rm -rf
          fi

      - name: Commit monitor state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git pull --rebase origin main || true

          git add hl_monitor.db reports coin_thresholds.json || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "update hl monitor state"

            for i in 1 2 3; do
              git pull --rebase origin main || true
              if git push; then
                echo "Push success."
                exit 0
              fi
              echo "Push failed, retry $i..."
              sleep 5
            done

            echo "Push failed after retries."
            exit 1
          fi
