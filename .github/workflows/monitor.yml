name: Hyperliquid Wallet Monitor FINAL

on:
  workflow_dispatch:

  schedule:
    # GitHub 自带定时改成每6小时兜底一次；主触发建议用 Cloudflare Worker Cron。
    - cron: "53 */6 * * *"

permissions:
  contents: write

concurrency:
  group: hl-wallet-monitor-final
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Pull latest state
        run: |
          git pull --rebase || true

      - name: Restore compressed database
        run: |
          if [ -f hl_monitor.db.gz ]; then
            echo "Restoring hl_monitor.db from hl_monitor.db.gz..."
            gzip -dc hl_monitor.db.gz > hl_monitor.db
            ls -lh hl_monitor.db hl_monitor.db.gz || true
          else
            echo "No hl_monitor.db.gz found. Starting with fresh local SQLite database."
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Test Telegram on manual run
        if: github.event_name == 'workflow_dispatch'
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          if [ -z "$TG_BOT_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then
            echo "TG_BOT_TOKEN or TG_CHAT_ID is empty. Skip TG test."
          else
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TG_CHAT_ID}" \
              -d text="GitHub Actions TG test: Hyperliquid monitor is starting."
          fi

      - name: Run Hyperliquid monitor
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}

          # 稳定版：使用本地 SQLite，结束后压缩成 hl_monitor.db.gz 提交，避免 GitHub 100MB 限制。
          DB_BACKEND: "sqlite"
          HL_DB_FILE: "hl_monitor.db"

          # 0 = 只有强信号或每日复盘才推送；1 = 每次运行都推送
          PUSH_EVERY_RUN: "0"

          # 到达这个 UTC 小时后，当天第一轮成功报告会推送；UTC 00 = 北京08 / 日本09
          DAILY_PUSH_HOUR_UTC: "0"

          HL_RPM: "300"
          HL_CONCURRENCY: "10"
          MIN_OK_RATE: "0.85"
          MIN_WALLET_COUNT: "100"
          TOP_N: "15"

          # 低杠杆长期单过滤
          LONG_TERM_MODE: "1"
          LONG_TERM_MIN_SCORE: "7"
          LONG_TERM_MIN_STREAK: "2"
          LONG_TERM_RISK_PCT: "2"
          LONG_TERM_MAX_LEVERAGE: "3"

          # 每日归档：reports/daily/YYYY-MM-DD，每天保留一份长期复盘快照
          DAILY_ARCHIVE: "1"
          DAILY_ARCHIVE_KEEP_DAYS: "30"

          # 钱包质量系统：最近30天滚动分类并导出全部钱包
          WALLET_QUALITY_MODE: "1"
          WALLET_QUALITY_WINDOW_DAYS: "30"
          WALLET_QUALITY_MIN_SAMPLES: "10"
          WALLET_QUALITY_EXPORT: "1"

          # 合约杠杆质量过滤：适配低杠杆长期单
          LEVERAGE_QUALITY_MODE: "1"
          LEVERAGE_LOW_MAX: "3"
          LEVERAGE_MID_MAX: "5"
          LEVERAGE_HIGH_MIN: "10"
          LIQ_SAFE_DISTANCE_PCT: "40"
          LIQ_DANGER_DISTANCE_PCT: "10"

          # 仓位生命周期收益：只按开/加/减/平统计，不使用账户权益 ROI
          POSITION_TRADE_MODE: "1"
          POSITION_PERF_WINDOW_DAYS: "30"
          POSITION_MIN_QTY_CHANGE_RATIO: "0.05"
          POSITION_MIN_QTY_CHANGE_USD: "1000"

          # 现货增减明细：资金流 Lite 中显示本轮增持/减持了哪些现货币
          SPOT_DETAIL_MIN_USD: "1000"

          # 报告底部复盘窗口：过去30天信号复盘 + 过去30天钱包主动资金流
          REPORT_REVIEW_WINDOW_DAYS: "30"

          # 信号解释 / 回测 / 资金费率与流动性过滤 / 健康状态
          SIGNAL_EXPLAIN_MODE: "1"
          BACKTEST_MODE: "1"
          SIGNAL_BACKTEST_WINDOW_DAYS: "30"
          # 回测门槛胜率：普通胜率只看方向，门槛胜率要求达到最低收益幅度
          # 信号生命周期：按提示从出现到消失/反转结算
          SIGNAL_LIFECYCLE_MODE: "1"
          STRONG_SIGNAL_MISSING_ROUNDS: "1"
          LONGTERM_SIGNAL_MISSING_ROUNDS: "2"
          # 主导钱包名单 + API异常保护
          DOMINANT_WALLETS_MODE: "1"
          DOMINANT_WALLET_TOP_N: "5"
          DATA_ANOMALY_PROTECT_MODE: "1"

          # GitHub 单文件 100MB 限制：先在脚本内裁剪，再由 hardcap 脚本二次兜底。
          DB_PRUNE_MODE: "1"
          DB_RAW_KEEP_RUNS: "12"
          DB_HISTORY_KEEP_DAYS: "35"
          DB_MAX_MB: "75"

          # 压缩包硬上限：hl_monitor.db.gz 超过这个值就自动进入更激进清理，避免 push 被 GitHub 拒绝。
          DB_GZ_MAX_MB: "92"
          HARDCAP_RAW_KEEP: "12"
          HARDCAP_HISTORY_DAYS: "35"
          HARDCAP_FINAL_REPORTS_DAYS: "7"

          BACKTEST_HURDLE_24H: "1"
          BACKTEST_HURDLE_72H: "2"
          BACKTEST_HURDLE_7D: "4"
          BACKTEST_HURDLE_15D: "6"
          BACKTEST_HURDLE_30D: "8"
          RISK_FILTER_MODE: "1"
          FUNDING_WARN_ABS_PCT: "0.03"
          FUNDING_DANGER_ABS_PCT: "0.08"
          LIQUIDITY_LOW_DAY_VOLUME: "20000000"
          LIQUIDITY_MIN_DAY_VOLUME: "5000000"
          HEALTH_STALE_HOURS: "2"

          PYTHONUNBUFFERED: "1"
          DETAILS_DIR: "reports/details"
          DB_INSERT_CHUNK: "500"
          RUN_STEP_LOG: "1"

        run: |
          python -u hl_monitor_final.py --rpm 300 --concurrency 10 --note "github hourly"


      - name: Hard-cap local database before compression
        if: always()
        env:
          HARDCAP_RAW_KEEP: "12"
          HARDCAP_HISTORY_DAYS: "35"
          HARDCAP_FINAL_REPORTS_DAYS: "7"
        run: |
          if [ -f hl_monitor.db ]; then
            echo "Running hardcap compaction before gzip..."
            python -u scripts/compact_sqlite_hardcap.py --db hl_monitor.db --raw-keep 12 --history-days 35 --final-reports-days 7
            ls -lh hl_monitor.db || true
          else
            echo "No hl_monitor.db found; skip hardcap."
          fi

      - name: Compress local database with gzip hard cap
        if: always()
        env:
          DB_GZ_MAX_MB: "92"
        run: |
          if [ ! -f hl_monitor.db ]; then
            echo "No hl_monitor.db found; skip compression."
            exit 0
          fi

          echo "Compressing hl_monitor.db to hl_monitor.db.gz..."
          gzip -9 -c hl_monitor.db > hl_monitor.db.gz
          ls -lh hl_monitor.db hl_monitor.db.gz || true

          gz_mb=$(python -c "import os; p='hl_monitor.db.gz'; print(os.path.getsize(p)/1024/1024 if os.path.exists(p) else 0)")
          echo "Compressed db size: ${gz_mb} MB; limit=${DB_GZ_MAX_MB} MB"

          python -c "import os,sys; size=os.path.getsize('hl_monitor.db.gz')/1024/1024 if os.path.exists('hl_monitor.db.gz') else 0; limit=float(os.getenv('DB_GZ_MAX_MB','92')); sys.exit(0 if size <= limit else 1)"
          ok=$?
          if [ "$ok" != "0" ]; then
            echo "hl_monitor.db.gz is still too large. Running emergency hardcap..."
            python -u scripts/compact_sqlite_hardcap.py --db hl_monitor.db --raw-keep 2 --history-days 30 --final-reports-days 3 --hard
            gzip -9 -c hl_monitor.db > hl_monitor.db.gz
            ls -lh hl_monitor.db hl_monitor.db.gz || true
          fi

          python -c "import os,sys; size=os.path.getsize('hl_monitor.db.gz')/1024/1024 if os.path.exists('hl_monitor.db.gz') else 0; limit=float(os.getenv('DB_GZ_MAX_MB','92')); print(f'Final compressed db size: {size:.2f} MB / limit {limit:.2f} MB'); sys.exit(1 if size > limit else 0)"

      - name: Clean report archives
        run: |
          mkdir -p reports/details
          # 新版不再保留小时级 final_report_run_x.txt，历史遗留文件也删除
          rm -f reports/final_report_run_*.txt
          # 精简版：根目录只保留核心报告，旧版遗留的全量 CSV / 辅助报告从根目录清掉
          rm -f             reports/wallet_states_latest.csv             reports/perp_positions_latest.csv             reports/spot_balances_latest.csv             reports/coin_signals_latest.csv             reports/active_changes_all_latest.csv             reports/fund_flow_lite_all_latest.csv             reports/wallet_quality_latest.csv             reports/wallet_quality_report.txt             reports/leverage_quality_latest.csv             reports/wallet_leverage_profile_latest.csv             reports/coin_leverage_summary_latest.csv             reports/leverage_quality_report.txt             reports/wallet_position_trades_latest.csv             reports/wallet_position_performance_latest.csv             reports/wallet_position_report.txt             reports/signal_explain_latest.csv             reports/coin_risk_latest.csv             reports/signal_backtest_latest.csv             reports/signal_backtest_latest_report.txt             reports/longterm_backtest_latest.csv             reports/longterm_backtest_latest_report.txt             reports/signal_lifecycle_latest.csv             reports/signal_lifecycle_report.txt             reports/long_term_candidates.csv             reports/watchlist_long.txt             reports/watchlist_short.txt             reports/watchlist_observe.txt
          # 每日归档只保留最近 30 天
          if [ -d reports/daily ]; then
            find reports/daily -mindepth 1 -maxdepth 1 -type d | sort | head -n -30 | xargs -r rm -rf
          fi

      - name: Commit monitor state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git pull --rebase origin main || true

          # 本地 SQLite 运行，GitHub 只提交压缩后的 hl_monitor.db.gz，不提交 hl_monitor.db。
          git rm --cached -f hl_monitor.db 2>/dev/null || true
          rm -f hl_monitor.db || true

          git add -f hl_monitor.db.gz reports coin_thresholds.json .gitignore scripts/compact_sqlite_hardcap.py || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "update hl monitor state"

            for i in 1 2 3; do
              git pull --rebase origin main || true
              if git push; then
                echo "Push success."
                exit 0
              fi
              echo "Push failed, retry $i..."
              sleep 5
            done

            echo "Push failed after retries."
            exit 1
          fi
