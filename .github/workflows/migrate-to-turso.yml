name: One-time migrate SQLite to Turso

on:
  workflow_dispatch:
    inputs:
      reset_turso_tables:
        description: "是否先清空 Turso 里同名表，避免重复。第一次迁移建议 true。"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
      LOCAL_SQLITE_DB: hl_monitor.db
      TURSO_MIGRATE_RESET: ${{ inputs.reset_turso_tables == 'true' && '1' || '0' }}
      TURSO_MIGRATE_BATCH_SIZE: "1000"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show existing database files
        run: |
          echo "Current directory: $(pwd)"
          ls -lh || true
          echo "Database files:"
          ls -lh hl_monitor.db hl_monitor.db.gz 2>/dev/null || true

      - name: Install migration dependency
        run: |
          python -m pip install --upgrade pip
          pip install libsql

      - name: Run one-time migration
        run: |
          python -u scripts/migrate_sqlite_to_turso.py

      - name: Verify migration again
        if: success()
        run: |
          python -u scripts/migrate_sqlite_to_turso.py --verify-only
